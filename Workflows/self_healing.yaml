name: self-healing
steps:
  - id: health_check
    command: |
      openclaw health --json
  
  - id: analyze_faults
    condition: "$health_check.json.status == 'error'"
    pipeline: |
      llm_task.invoke --prompt "Analyze these system health faults. If you detect a SessionWriteLockTimeoutError or stale lock, return SIG_UNLOCK. Otherwise, propose a one-line bash fix. Faults: $health_check.stdout"

  - id: resolution
    condition: "$health_check.json.status == 'error' && $analyze_faults.stdout == 'SIG_UNLOCK'"
    command: |
      openclaw tasks maintenance --apply --stale-locks

  - id: wait_for_approval
    condition: "$health_check.json.status == 'error' && $analyze_faults.stdout != 'SIG_UNLOCK'"
    pipeline: |
      approve --prompt "Critical fix proposed: $analyze_faults.stdout\n\nDeploy patch?"

  - id: deploy_fix
    condition: "$health_check.json.status == 'error' && $analyze_faults.stdout != 'SIG_UNLOCK' && $wait_for_approval.approved == true"
    command: |
      $analyze_faults.stdout
