name: self-healing
steps:
  - id: health_check
    command: >-
      lobster 'exec --json --shell \"openclaw health --json\"'
  
  - id: analyze_faults
    condition: "$health_check.json.status == 'error'"
    command: >-
      lobster 'exec --shell \"gemini \\\"Analyze these system health faults and propose a one-line bash fix.\n\nFaults: $health_check.stdout\\\"\"'

  - id: wait_for_approval
    condition: "$health_check.json.status == 'error'"
    command: >-
      lobster 'approve --prompt \"Critical fix proposed: $analyze_faults.stdout\n\nDeploy patch?\"'

  - id: deploy_fix
    condition: "$health_check.json.status == 'error' && $wait_for_approval.approved == true"
    command: >-
      lobster 'exec --shell \"$analyze_faults.stdout\"'
