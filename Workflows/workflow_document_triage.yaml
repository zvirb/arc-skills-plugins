name: workflow-document-triage
steps:
  - id: search_doc
    command: |
      gog drive ls --json | jq -r '.[] | select(.name == "Triage.md")' | head -n 1
  
  - id: handle_missing
    condition: "$search_doc.stdout == ''"
    command: |
      gog docs create "Triage.md" --json

  - id: extract_items
    command: |
      gemini "Read the following document content (mocked for triage) and extract the primary action item for Markus. Output ONLY the action item text. Content: TEST ACTION ITEM: Prepare report for Markus."

  - id: create_task
    command: |
      gog tasks add @default --title "TRIAGE: $extract_items.stdout"

  - id: send_email
    command: |
      gog gmail send --to "markuszvirbulis@gmail.com" --subject "Triage Workflow Complete" --body "Orchestrated successful triage. Task ID: $create_task.stdout"
