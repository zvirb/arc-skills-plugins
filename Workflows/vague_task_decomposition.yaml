name: vague-task-decomposition-refactor
description: "Hardened, deterministic task decomposition using specialist nodes."
args:
  task:
    description: "The broad task to decompose"
steps:
  - id: extraction
    agent: Operator # Maxwell 7B
    pipeline: |
      openclaw.invoke --tool llm-extract-action-items --args-json "{\"text\": \"$task\"}"

  - id: validation
    pipeline: |
      # Jidoka Gate: Ensure it's a non-empty array
      exec --shell "echo '$extraction.stdout' | jq -e '. | length > 0'"

  - id: review
    pipeline: |
      approve --prompt "Decomposed subtasks identified:\n\n$extraction.stdout\n\nAdd these to Google Tasks?"

  - id: execution
    condition: "$review.approved == true"
    agent: Main # Pascal
    pipeline: |
      openclaw.invoke --tool google-tasks-create-task --args-json "{\"title\": \"$item\"}"
    stdin: $extraction.stdout
    each: true

  - id: summary
    pipeline: |
      echo "Successfully created $(echo '$extraction.stdout' | jq '. | length') subtasks."
