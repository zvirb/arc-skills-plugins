name: morning-briefing-refactor
description: "Hardened, deterministic daily planning pipeline using Atomic Nodes."
steps:
  - id: context_acquisition
    command: |
      # Fetch Calendar
      gog calendar events primary --from "today" --to "tomorrow" --json
      # Fetch Tasks
      gog tasks ls --status needsAction --json
      # Fetch Weather
      gog weather forecast --location "Sunbury, VIC" --json

  - id: strategic_planning
    pipeline: |
      openclaw.invoke --tool llm-plan-time-blocks --args-json "{\"events\": $context_acquisition.stdout[0], \"tasks\": $context_acquisition.stdout[1], \"weather\": $context_acquisition.stdout[2]}"

  - id: digest_generation
    pipeline: |
      openclaw.invoke --tool llm-summarize-text --args-json "{\"text\": $strategic_planning.stdout, \"format\": \"WhatsApp Digest\"}"

  - id: deliver_whatsapp
    pipeline: |
      openclaw.invoke --tool whatsapp-send-message --args-json "{\"to\": \"USER_PHONE\", \"message\": $digest_generation.stdout}"

  - id: approval_gate
    pipeline: |
      approve --prompt "Approve the proposed daily plan?"

  - id: commit_finalize
    condition: "$approval_gate.approved == true"
    pipeline: |
      openclaw.invoke --tool google-calendar-create-event --args-json "{\"events\": $strategic_planning.stdout}"
