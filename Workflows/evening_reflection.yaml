name: evening-reflection
steps:
  - id: get_reflection
    command: |
      gemini "Ask the user for an evening reflection on their day via WhatsApp and wait for a reply."

  - id: extract_preferences
    command: |
      gemini "Extract any new preferences or learnings from this reflection: $get_reflection.stdout"

  - id: update_memory
    command: |
      gemini "Integrate these new preferences into MEMORY.md: $extract_preferences.stdout"

  - id: calibrate_wellness
    command: |
      lobster run /home/marku/.openclaw/workspace/wellness_orchestrator.yaml
