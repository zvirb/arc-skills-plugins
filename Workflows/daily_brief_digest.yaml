name: daily-brief-digest
args:
  user_phone:
    default: "USER_PHONE"
steps:
  - id: fetch_emails
    command: |
      gog gmail search "newer_than:1d" --limit 10 --json
  - id: fetch_calendar
    command: |
      gog calendar events primary --from "today" --to "today" --json
  - id: fetch_news
    command: |
      gemini "Find the top 3 news headlines today."
  - id: summarize
    command: |
      gemini "Summarize the following into a daily brief: Emails: $fetch_emails.stdout Calendar: $fetch_calendar.stdout News: $fetch_news.stdout Format: Markdown digest with emojis."
  - id: deliver
    pipeline: clawd.invoke --tool message --action send --args-json "{\"provider\":\"whatsapp\",\"to\":\"${user_phone}\",\"message\":\"Daily Brief Digest:\n$summarize.stdout\"}"
